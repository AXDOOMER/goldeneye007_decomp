name: GE-CI

on:
  push:
    branches: master
  pull_request:
    branches: master
    
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:

  dependencies:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2

      - name: Install Depedencies
        run: |
          sudo apt update
          sudo apt install binutils-mips-linux-gnu make


  extractedassets:
    runs-on: ubuntu-18.04
    needs: dependencies
    steps:
      - uses: actions/checkout@v2

      - name: Get US File
        env:
          FILE_US: ${{ secrets.SECRET_FILE_US  }}
        run: wget -O baserom.u.z64 $FILE_US
      
      - name: Get JP File
        env:
          FILE_JP: ${{ secrets.SECRET_FILE_JP  }}
        run: wget -O baserom.j.z64 $FILE_JP

      - name: Extract US Assets
        run: ./extract_baserom.u.sh

      - name: Extract JP Assets
        run: ./extract_diff.j.sh

  buildus:
    
    runs-on: ubuntu-18.04
    needs: [dependencies, extractedassets]
    steps:
      - uses: actions/checkout@v2

      - name: Make US 
        run: make -j VERSION=US
      
      - name: Stats
        run: python3 tools/ge-stats.py

  buildjp:
    
    runs-on: ubuntu-18.04
    needs: [dependencies, extractedassets]
    steps:
      - uses: actions/checkout@v2

      - name: Make JP 
        run: make -j VERSION=JP
      
      - name: Stats
        run: python3 tools/ge-stats.py
